kind = "web"
previewPath = "/"
title = "MirrorMind"
version = "1.0.0"
id = "artifacts/mirrormind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25850

[services.development]
run = "pnpm --filter @workspace/mirrormind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mirrormind", "run", "build" ]
publicDir = "artifacts/mirrormind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25850"
BASE_PATH = "/"
